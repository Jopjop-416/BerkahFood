<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register - AltitudeTrails</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @font-face {
        font-family: 'Gazpacho';
        src: url('./src/styles/asset/font/Gazpacho%20Regular.ttf')
          format('truetype');
        font-weight: 400;
        font-style: normal;
      }

      @font-face {
        font-family: 'Gazpacho';
        src: url('./src/styles/asset/font/Gazpacho%20Bold.ttf')
          format('truetype');
        font-weight: 700;
        font-style: normal;
      }

      * {
        font-family: 'Poppins', sans-serif;
      }

      .font-gazpacho {
        font-family: 'Gazpacho', Georgia, serif;
      }

      .auth-toast {
        position: fixed;
        top: 60px;
        right: 24px;
        z-index: 9999;
        width: min(360px, calc(100vw - 32px));
        border: 1px solid rgba(52, 44, 39, 0.14);
        border-left: 5px solid #ffb703;
        border-radius: 18px;
        background: #fffbf2;
        box-shadow: 0 18px 50px rgba(52, 44, 39, 0.18);
        color: #342c27;
        opacity: 0;
        pointer-events: none;
        transform: translateX(120%);
        transition:
          opacity 300ms ease,
          transform 420ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      .auth-toast.is-visible {
        opacity: 1;
        transform: translateX(0);
      }

      .auth-toast.is-leaving {
        opacity: 0;
        transform: translateX(-28px);
      }

      .auth-toast.is-success {
        border-left-color: #ffb703;
      }

      .auth-toast.is-error {
        border-left-color: #e63946;
      }

      .auth-toast-title {
        font-family: 'Gazpacho', Georgia, serif;
      }

      @media (max-width: 640px) {
        .auth-toast {
          top: 16px;
          right: 16px;
          left: 16px;
          width: auto;
        }
      }
    </style>
  </head>
  <body class="bg-white text-gray-900">
    <!-- ===== Notifikasi Register ===== -->
    <div id="authToast" class="auth-toast" role="status" aria-live="polite">
      <div class="px-5 py-4">
        <p id="toastTitle" class="auth-toast-title text-[18px] font-bold">
          Notifikasi
        </p>
        <p id="toastMessage" class="mt-1 text-[13px] leading-[1.45]"></p>
      </div>
    </div>

    <!-- ===== Layout Utama ===== -->
    <main class="min-h-screen flex">
      <!-- ===== Panel Visual Kiri ===== -->
      <div class="relative hidden lg:flex lg:w-1/2">
        <img
          src="./src/styles/asset/font/image/bg3.png"
          alt="Mountain"
          class="h-full w-full object-cover"
        />
        <div class="absolute inset-0 flex flex-col justify-between p-8 text-white">
          <div class="flex items-center gap-2"></div>
        </div>
      </div>

      <!-- ===== Panel Form Register ===== -->
      <div class="flex w-full items-center justify-center p-7 lg:w-1/2">
        <div class="w-full max-w-md">
          <!-- ===== Branding ===== -->
          <a href="index.html" class="inline-block">
            <img
              src="./src/styles/asset/font/image/logo2.png"
              alt="Logo"
              class="h-12 w-auto object-contain"
            />
          </a>

          <!-- ===== Judul Halaman ===== -->
          <h2 class="mt-1 mb-2 text-3xl font-bold text-[#342c27] font-gazpacho">
            Create Account
          </h2>
          <p class="mb-10 text-[14px] text-[#342c27]">
            Silahkan register untuk melihat pilihan Nasi Kuning dari restoran kami.
          </p>

          <!-- ===== Form Register ===== -->
          <form id="registerForm" class="space-y-4">
            <!-- ===== Input Username ===== -->
            <div>
              <label for="username" class="mb-1 block text-[13px] font-medium">
                Username
              </label>
              <input
                type="text"
                id="username"
                required
                minlength="3"
                maxlength="20"
                autocomplete="username"
                class="mb-2 w-full rounded-full border px-4 py-3 text-[13px] focus:outline-none focus:ring-1 focus:ring-black"
                placeholder="yourusername"
              />
            </div>

            <!-- ===== Input Email ===== -->
            <div>
              <label for="email" class="mt-3 mb-1 block text-[13px] font-medium">
                Email
              </label>
              <input
                id="email"
                type="email"
                required
                autocomplete="email"
                class="mb-2 w-full rounded-full border px-4 py-3 text-[13px] focus:outline-none focus:ring-1 focus:ring-black"
                placeholder="you@example.com"
              />
            </div>

            <!-- ===== Input Password ===== -->
            <div>
              <label
                for="password"
                class="mb-1 block text-[13px] font-medium"
              >
                Password
              </label>
              <input
                id="password"
                type="password"
                required
                minlength="8"
                autocomplete="new-password"
                class="w-full rounded-full border px-4 py-3 text-[13px] focus:outline-none focus:ring-1 focus:ring-black"
                placeholder="Minimal 8 karakter"
              />
            </div>

            <!-- ===== Input Konfirmasi Password ===== -->
            <div>
              <label
                for="repassword"
                class="mb-1 block text-[13px] font-medium"
              >
                Re-type Password
              </label>
              <input
                id="repassword"
                type="password"
                required
                minlength="8"
                autocomplete="new-password"
                class="w-full rounded-full border px-4 py-3 text-[13px] focus:outline-none focus:ring-1 focus:ring-black"
                placeholder="Ulangi password"
              />
            </div>

            <!-- ===== Tombol Register ===== -->
            <button
              type="submit"
              id="registerSubmitButton"
              class="font-gazpacho inline-flex w-full items-center justify-center rounded-full border border-transparent bg-[#342c27] px-7 py-3 text-[14px] font-semibold text-white transition hover:border-black border-[3px] hover:bg-white hover:text-[#342c27]"
            >
              Create account
            </button>
          </form>

          <!-- ===== Navigasi ke Login ===== -->
          <p class="mt-3 text-center text-[13px]">
            Already have an account?
            <a href="./login.html" class="text-[14px] font-semibold text-black">
              Sign in
            </a>
          </p>

          <!-- ===== Logika Register ===== -->
          <script>
            const STORAGE_KEYS = {
              registeredUser: 'altitude_registered_user',
              activeUser: 'altitude_user',
              pendingToast: 'altitude_pending_toast',
            };

            const registerForm = document.getElementById('registerForm');
            const usernameInput = document.getElementById('username');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const repasswordInput = document.getElementById('repassword');
            const registerSubmitButton = document.getElementById(
              'registerSubmitButton',
            );
            const authToast = document.getElementById('authToast');
            const toastTitle = document.getElementById('toastTitle');
            const toastMessage = document.getElementById('toastMessage');
            let toastTimer;

            function showToast(message, type, duration = 2000) {
              const title = type === 'success' ? 'Berhasil' : 'Perlu dicek';

              clearTimeout(toastTimer);
              toastTitle.textContent = title;
              toastMessage.textContent = message;
              authToast.className = `auth-toast is-${type}`;
              authToast.offsetHeight;
              authToast.classList.add('is-visible');

              toastTimer = setTimeout(function () {
                authToast.classList.add('is-leaving');
                authToast.classList.remove('is-visible');
              }, duration);
            }

            function normalizeUsername(value) {
              return value.trim().replace(/\s+/g, ' ');
            }

            function isValidEmail(email) {
              return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }

            registerForm.addEventListener('submit', function (event) {
              event.preventDefault();

              const username = normalizeUsername(usernameInput.value);
              const email = emailInput.value.trim().toLowerCase();
              const password = passwordInput.value;
              const repassword = repasswordInput.value;
              const existingUserValue = localStorage.getItem(
                STORAGE_KEYS.registeredUser,
              );
              let existingUser = null;

              try {
                existingUser = existingUserValue
                  ? JSON.parse(existingUserValue)
                  : null;
              } catch (error) {
                localStorage.removeItem(STORAGE_KEYS.registeredUser);
              }

              if (username.length < 3) {
                showToast('Username minimal 3 karakter.', 'error');
                return;
              }

              if (!isValidEmail(email)) {
                showToast('Format email belum valid.', 'error');
                return;
              }

              if (password.length < 8) {
                showToast('Password minimal 8 karakter.', 'error');
                return;
              }

              if (password !== repassword) {
                showToast('Password dan konfirmasi password harus sama.', 'error');
                return;
              }

              if (existingUser && existingUser.email === email) {
                showToast(
                  'Email ini sudah terdaftar. Silakan login menggunakan akun yang ada.',
                  'error',
                );
                return;
              }

              registerSubmitButton.disabled = true;
              registerSubmitButton.classList.add(
                'cursor-not-allowed',
                'opacity-80',
              );

              const registeredUser = {
                username,
                email,
                password,
                createdAt: new Date().toISOString(),
              };

              localStorage.setItem(
                STORAGE_KEYS.registeredUser,
                JSON.stringify(registeredUser),
              );

              sessionStorage.setItem(
                STORAGE_KEYS.pendingToast,
                JSON.stringify({
                  message: 'Registrasi berhasil. Silakan login dengan akun baru.',
                  type: 'success',
                }),
              );

              registerForm.reset();
              window.location.href = './login.html';
            });

          </script>
        </div>
      </div>
    </main>
  </body>
</html>
