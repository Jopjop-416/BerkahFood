<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Detail Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fcf4e6;
        color: #342c27;
        font-family: "Inter", sans-serif;
      }

      .card {
        width: min(720px, calc(100% - 32px));
        border-radius: 24px;
        padding: 40px 32px;
        background: #ffffff;
        box-shadow: 0 20px 50px rgba(52, 44, 39, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(36px, 6vw, 56px);
        line-height: 0.95;
      }

      p {
        margin: 0;
        font-size: 18px;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Detail Menu</h1>
      <p>Halaman ini masih kosong dan siap diisi konten detail menu berikutnya.</p>
    </main>
  </body>
</html>
